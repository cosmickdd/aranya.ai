"""
ECS Fargate deployment template for Aranya.ai
Deploys: ECS cluster, Fargate task, ALB, CloudWatch logs, RDS (optional)
"""
AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aranya.ai on ECS Fargate'

Parameters:
  ContainerImage:
    Type: String
    Description: Docker image URI (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com/aranya:latest)
  
  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of Fargate tasks to run
  
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  # ECS Cluster
  AranyaCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'aranya-${Environment}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # CloudWatch Log Group
  AranyaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/aranya-${Environment}'
      RetentionInDays: 30

  # ECS Task Definition
  AranyaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'aranya-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: aranya
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: PORT
              Value: '8000'
          Secrets:
            - Name: TWILIO_ACCOUNT_SID
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:aranya/twilio/account-sid'
            - Name: TWILIO_AUTH_TOKEN
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:aranya/twilio/auth-token'
            - Name: GEMINI_API_KEY
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:aranya/gemini/api-key'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AranyaLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 10

  # IAM Execution Role
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:aranya/*'

  # IAM Task Role
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource: !Sub 'arn:aws:s3:::aranya-audio-*'

  # Security Group
  AranyaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS security group for Aranya
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # ECS Service
  AranyaService:
    Type: AWS::ECS::Service
    DependsOn: LoadBalancerListener
    Properties:
      ServiceName: !Sub 'aranya-service-${Environment}'
      Cluster: !Ref AranyaCluster
      TaskDefinition: !Ref AranyaTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref AranyaSecurityGroup
          Subnets: !Split
            - ','
            - !ImportValue 'VPCSubnets'
      LoadBalancers:
        - ContainerName: aranya
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

  # Application Load Balancer
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'aranya-alb-${Environment}'
      Subnets: !Split
        - ','
        - !ImportValue 'VPCSubnets'
      SecurityGroups:
        - !Ref AranyaSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'aranya-tg-${Environment}'
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue 'VPCID'
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ServiceURL:
    Description: URL of the Aranya service
    Value: !GetAtt LoadBalancer.DNSName
  
  ClusterName:
    Description: ECS Cluster name
    Value: !Ref AranyaCluster
